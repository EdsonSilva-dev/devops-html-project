<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TriviaPlayground</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="frame">
      <header class="topbar">
        <div class="brand">TriviaPlayground</div>
        <nav class="nav">
          <button class="nav-link" id="nav-home">Topics</button>
          <button class="nav-link" id="nav-login">Sign In</button>
          <button class="nav-link" id="nav-leaderboard">Leaderboard</button>
        </nav>
      </header>

      <main>
        <section id="home-view" class="view active">
          <section class="hero">
            <div>
              <h1>The World is Your <span>Playground.</span></h1>
              <p>
                Challenge your intellect with our curated trivia journeys.
              </p>
              <div class="hero-actions">
                <button id="start-btn" class="btn btn-primary">Start Playing</button>
                <button id="leaderboard-btn" class="btn btn-secondary">View Leaderboard</button>
              </div>
            </div>
          </section>

          <section class="section">
            <h2>Choose Your Arena</h2>
            <div id="category-grid" class="card-grid"></div>
          </section>
        </section>

        <section id="login-view" class="view">
          <div class="panel">
            <h2>Sign In</h2>
            <p>Use your name to continue and save your results.</p>
            <input id="username-input" type="text" placeholder="Enter your name" maxlength="24" />
            <button id="login-btn" class="btn btn-primary">Login</button>
            <p id="login-message"></p>
          </div>
        </section>

        <section id="difficulty-view" class="view">
          <div class="section">
            <h2 id="difficulty-title">Choose Difficulty</h2>
            <div id="difficulty-grid" class="card-grid"></div>
            <button id="back-home-btn" class="btn btn-secondary">Back</button>
          </div>
        </section>

        <section id="quiz-view" class="view">
          <div class="panel">
            <p id="quiz-meta"></p>
            <h2 id="question-text"></h2>
            <div id="answers" class="answers"></div>
            <button id="next-btn" class="btn btn-primary hidden">Next</button>
          </div>
        </section>

        <section id="result-view" class="view">
          <div class="panel">
            <h2>Quiz Finished</h2>
            <p id="result-text"></p>
            <button id="save-score-btn" class="btn btn-primary">Save Score</button>
            <button id="play-again-btn" class="btn btn-secondary">Play Again</button>
          </div>
        </section>

        <section id="leaderboard-view" class="view">
          <div class="section">
            <h2>Leaderboard</h2>
            <div id="leaderboard-list"></div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
